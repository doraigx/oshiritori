<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>しりとりポータル - マッチング修正版</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px 0;
      box-sizing: border-box;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
      width: 90%;
      max-width: 400px;
    }
    h1 { color: #333; margin-bottom: 24px; }
    h3 { color: #555; text-align: left; margin-top: 20px; margin-bottom: 10px; }
    button {
      background-color: #4285f4;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover { background-color: #357ae8; }
    input[type="text"], select {
      box-sizing: border-box;
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background-color: white;
    }
    hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    .hidden { display: none; }
    .user-info { margin-bottom: 8px; font-weight: bold; color: #555; text-align: left; display: flex; justify-content: space-between; align-items: center; }
    .status-select-zone { text-align: left; margin-bottom: 20px; font-size: 14px; color: #666; display: flex; align-items: center; gap: 8px; }
    .status-select-zone select { margin-bottom: 0; width: auto; padding: 6px 10px; font-size: 14px; }

    .flex-group {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .flex-group input { margin-bottom: 0; flex: 2; }
    .flex-group button { flex: 1; padding: 12px 10px; font-size: 14px; }

    /* しりとり用 */
    .word-display {
      font-size: 32px;
      font-weight: bold;
      color: #333;
      margin: 20px 0;
      background: #f0f4f8;
      padding: 15px;
      border-radius: 8px;
    }
    .turn-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 15px;
    }
    .my-turn { background-color: #e6f4ea; color: #137333; }
    .enemy-turn { background-color: #fce8e6; color: #c5221f; }
    
    .timer-display {
      font-size: 24px;
      font-weight: bold;
      color: #ea4335;
      margin-bottom: 15px;
      background: #fff5f5;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #fcedeb;
    }

    .action-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .btn-action { font-size: 14px; padding: 10px; }
    .shingi-count-text { font-size: 12px; color: #666; margin-top: 4px; }

    /* フレンド機能用 */
    .friend-list {
      text-align: left;
      background: #f9f9f9;
      padding: 10px;
      border-radius: 6px;
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 15px;
      border: 1px solid #eee;
    }
    .friend-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      color: #444;
      font-size: 14px;
    }
    .friend-name-link {
      cursor: pointer;
      text-decoration: underline;
      color: #4285f4;
    }
    .status-badge { font-size: 11px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }
    .status-online { background-color: #e6f4ea; color: #137333; }
    .status-offline { background-color: #f1f3f4; color: #5f6368; }
    .btn-invite { background-color: #34a853; font-size: 12px; padding: 6px 10px; width: auto; border-radius: 4px; }

    .invite-alert-box { background-color: #fff3cd; border: 2px dashed #ffc107; padding: 15px; border-radius: 8px; margin-bottom: 20px; color: #856404; }

    /* 履歴表示用 */
    .history-section {
      margin-top: 25px;
      text-align: left;
    }
    .history-card {
      background: #fafafa;
      border: 1px solid #eef0f4;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .win-text { color: #137333; font-weight: bold; }
    .lose-text { color: #c5221f; font-weight: bold; }
    
    .btn-small-edit { background-color: #666; font-size: 11px; padding: 4px 8px; width: auto; border-radius: 4px; margin-left: 8px; }
    #loading-status { font-size: 14px; color: #666; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div class="container">
    <h1>しりとりポータル</h1>
    
    <div id="loading-status">接続チェック中...</div>

    <!-- 招待通知エリア -->
    <div id="invite-notification-zone" class="invite-alert-box hidden">
      <span id="invite-msg-text">〇〇から対戦申し込み！</span>
      <div class="action-group" style="margin-top: 10px;">
        <button id="btn-accept-invite" style="background-color: #28a745; padding: 6px;">受ける</button>
        <button id="btn-decline-invite" style="background-color: #dc3545; padding: 6px;">断る</button>
      </div>
    </div>

    <!-- 1. 初期ログイン画面 -->
    <div id="login-screen" class="hidden">
      <p>ゲームを始めるにはGoogleアカウントでログインしてください。</p>
      <button id="btn-login">Googleでログイン</button>
    </div>

    <!-- 2. 初回のみ表示されるユーザーネーム登録画面 -->
    <div id="register-screen" class="hidden">
      <p>ユーザーネームを決めてください</p>
      <input type="text" id="username-input" placeholder="例: どーらい">
      <button id="btn-register">登録して次へ</button>
    </div>

    <!-- 3. ログイン完了後のメインメニュー画面 -->
    <div id="menu-screen" class="hidden">
      <div class="user-info">
        <span id="user-display">プレイヤー: ----</span>
        <button id="btn-edit-name" class="btn-small-edit">✏️ 名前変更</button>
      </div>

      <div class="status-select-zone">
        <span>自分の状態:</span>
        <select id="select-my-status">
          <option value="auto">自動 (開いている時のみON)</option>
          <option value="online">常にオンライン固定</option>
          <option value="offline">オフライン (隠れる)</option>
        </select>
      </div>

      <button id="btn-to-friend" style="background-color: #9c27b0; margin-bottom: 15px; padding: 8px;">👥 フレンド画面・オンラインリスト</button>
      <hr>
      
      <h3>【対人モード】</h3>
      <button id="btn-create-room" style="background-color: #f4b400; margin-bottom: 15px;">新しく部屋を作る（4桁ID発行）</button>
      
      <div class="flex-group">
        <input type="text" id="room-id-input" placeholder="4桁の部屋IDを入力">
        <button id="btn-join-room" style="background-color: #4285f4;">部屋に入る</button>
      </div>
      
      <hr>
      <h3>【フリーモード】</h3>
      <button id="btn-free" style="background-color: #34a853;">オートマッチング（自動対戦）</button>
      
      <div class="history-section">
        <h3>直近の勝敗履歴 (5件)</h3>
        <div id="history-list-container">履歴はありません</div>
      </div>
    </div>

    <!-- 5. フレンド管理・オンライン画面 -->
    <div id="friend-screen" class="hidden">
      <h2>フレンド・オンライン</h2>
      <div class="user-info" id="friend-my-tag" style="color: #9c27b0; font-weight: bold; justify-content: center;">あなたのタグ: ----</div>
      
      <h3>フレンドリスト（名前タップで戦績確認）</h3>
      <div id="friend-list-container" class="friend-list">フレンドはいません</div>

      <h3>フレンド追加</h3>
      <div class="flex-group">
        <input type="text" id="friend-search-input" placeholder="例: どーらい#1234">
        <button id="btn-add-friend" style="background-color: #9c27b0;">追加</button>
      </div>
      
      <button id="btn-friend-back" style="background-color: #888; margin-top: 10px;">メニューに戻る</button>
    </div>

    <!-- 4. 対戦メイン画面 -->
    <div id="game-screen" class="hidden">
      <h2 id="room-title">部屋ID: ----</h2>
      <div id="game-status" style="font-weight: bold; color: #555;">相手の参加を待っています...</div>
      
      <!-- 招待取り消しボタン -->
      <button id="btn-cancel-invite" class="hidden" style="background-color: #e0a800; color: white; margin-top: 10px; margin-bottom: 10px; font-size: 16px; padding: 12px; width: 100%; border-radius: 6px;">🏳️ 招待を取り消す</button>

      <div id="shiritori-area" class="hidden">
        <div id="timer-box" class="timer-display">残り時間: 15秒</div>
        <div id="turn-indicator" class="turn-badge">読み込み中...</div>
        <div class="word-display" id="current-word">ーーー</div>
        
        <div class="flex-group">
          <input type="text" id="shiritori-input" placeholder="次の単語を入力（ひらがな）">
          <button id="btn-send-word" style="background-color: #34a853;">送信</button>
        </div>

        <div class="action-group">
          <div style="flex: 1;">
            <button id="btn-shingi" class="btn-action" style="background-color: #ff9800;">🤔 審議 (ダウト)</button>
            <div id="shingi-counter" class="shingi-count-text">審議残り: 10回</div>
          </div>
          <div style="flex: 1;">
            <button id="btn-retire" class="btn-action" style="background-color: #ea4335;">🏳️ リタイア</button>
          </div>
        </div>
      </div>
      
      <!-- メニューに戻るボタン -->
      <button id="btn-leave" style="background-color: #888; margin-top: 20px;">メニューに戻る</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion, onSnapshot, collection, query, where, getDocs, deleteDoc, serverTimestamp, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDFeeG0cXom0TBmUngUDbBf_0CqKVRqKwg",
      authDomain: "oshiritori.firebaseapp.com",
      projectId: "oshiritori",
      storageBucket: "oshiritori.firebasestorage.app",
      messagingSenderId: "947062662188",
      appId: "1:947062662188:web:362b7ccff6e01a5ecd9d89",
      measurementId: "G-15T7LNJG2J"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const loadingStatus = document.getElementById("loading-status");
    const loginScreen = document.getElementById("login-screen");
    const registerScreen = document.getElementById("register-screen");
    const menuScreen = document.getElementById("menu-screen");
    const gameScreen = document.getElementById("game-screen");
    const friendScreen = document.getElementById("friend-screen");
    
    const usernameInput = document.getElementById("username-input");
    const userDisplay = document.getElementById("user-display");
    const roomIdInput = document.getElementById("room-id-input");
    const roomTitle = document.getElementById("room-title");
    const gameStatus = document.getElementById("game-status");

    const shiritoriArea = document.getElementById("shiritori-area");
    const turnIndicator = document.getElementById("turn-indicator");
    const currentWord = document.getElementById("current-word");
    const shiritoriInput = document.getElementById("shiritori-input");
    const btnSendWord = document.getElementById("btn-send-word");
    const btnShingi = document.getElementById("btn-shingi");
    const btnRetire = document.getElementById("btn-retire");
    const shingiCounter = document.getElementById("shingi-counter");
    const timerBox = document.getElementById("timer-box");
    const historyListContainer = document.getElementById("history-list-container");
    const btnCancelInvite = document.getElementById("btn-cancel-invite");
    const btnLeaveRoom = document.getElementById("btn-leave");

    const inviteZone = document.getElementById("invite-notification-zone");
    const inviteMsgText = document.getElementById("invite-msg-text");
    const btnAcceptInvite = document.getElementById("btn-accept-invite");
    const btnDeclineInvite = document.getElementById("btn-decline-invite");

    const friendMyTag = document.getElementById("friend-my-tag");
    const friendListContainer = document.getElementById("friend-list-container");
    const friendSearchInput = document.getElementById("friend-search-input");
    const selectMyStatus = document.getElementById("select-my-status");

    const generateRoomId = () => {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let result = "";
      for (let i = 0; i < 4; i++) { result += chars.charAt(Math.floor(Math.random() * chars.length)); }
      return result;
    };

    const generateUserTag = () => { return Math.floor(1000 + Math.random() * 9000).toString(); };

    let currentUid = null;
    let activeRoomId = null;
    let unsubscribeRoom = null;
    let unsubscribeFriends = null;
    let unsubscribeInvite = null;

    let countdownInterval = null;
    let heartBeatInterval = null;
    let remainingTime = 15;
    let incomingRoomId = null;
    let isFriendMatchMode = false;
    let currentRoomPlayers = [];
    let isHistorySaved = false;
    let currentSentInviteId = null;   
    let currentSentInviteTargetUid = null; 

    const smallToLargeMap = { 'ゃ': '原', 'ゅ': 'ゆ', 'ょ': 'よ', 'っ': 'つ' };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUid = user.uid;
        loadingStatus.textContent = "";
        await checkUserRegistered(user.uid);
      } else {
        currentUid = null;
        loadingStatus.textContent = "";
        showScreen("login");
      }
    });

    document.getElementById("btn-login").addEventListener("click", async () => {
      try {
        loadingStatus.textContent = "ログイン認証中...";
        await signInWithPopup(auth, provider);
      } catch (error) {
        console.error(error);
        loadingStatus.textContent = "";
        alert("ログインに失敗しました。");
      }
    });

    async function checkUserRegistered(uid) {
      const userRef = doc(db, "users", uid);
      const userSnap = await getDoc(userRef);

      if (userSnap.exists()) {
        let userData = userSnap.data();
        if (!userData.userTag || !userData.friends) {
          const autoTag = userData.userTag || generateUserTag();
          const autoFriends = userData.friends || [];
          await updateDoc(userRef, { userTag: autoTag, friends: autoFriends });
          const freshSnap = await getDoc(userRef);
          userData = freshSnap.data();
        }

        if (userData.settingStatus) {
          selectMyStatus.value = userData.settingStatus;
        }

        showScreen("menu");
        userDisplay.textContent = `プレイヤー: ${userData.username}#${userData.userTag}`;
        friendMyTag.textContent = `あなたのタグ: ${userData.username}#${userData.userTag}`;
        
        startHeartbeat();
        setupFriendsListener();
        setupInviteListener();
        loadGlobalHistory();
      } else { showScreen("register"); }
    }

    document.getElementById("btn-register").addEventListener("click", async () => {
      const name = usernameInput.value.trim();
      if (!name) return alert("名前を入力してください。");
      if (name.includes("#")) return alert("名前に'#'は使用できません。");
      try {
        const tag = generateUserTag();
        await setDoc(doc(db, "users", currentUid), {
          uid: currentUid, username: name, userTag: tag, friends: [], settingStatus: "auto", lastActive: serverTimestamp(), createdAt: new Date()
        });
        showScreen("menu");
        userDisplay.textContent = `プレイヤー: ${name}#${tag}`;
        friendMyTag.textContent = `あなたのタグ: ${name}#${tag}`;
        startHeartbeat();
        setupFriendsListener();
        setupInviteListener();
        loadGlobalHistory();
      } catch (error) { console.error(error); }
    });

    document.getElementById("btn-edit-name").addEventListener("click", async () => {
      const oldSnap = await getDoc(doc(db, "users", currentUid));
      if (!oldSnap.exists()) return;
      const oldData = oldSnap.data();

      const newName = prompt("新しいユーザーネームを入力してください：", oldData.username);
      if (newName === null) return;
      const trimmedName = newName.trim();
      
      if (!trimmedName) return alert("名前を入力してください。");
      if (trimmedName.includes("#")) return alert("名前に'#'は使用できません。");

      try {
        await updateDoc(doc(db, "users", currentUid), { username: trimmedName });
        userDisplay.textContent = `プレイヤー: ${trimmedName}#${oldData.userTag}`;
        alert("名前を変更しました！");
      } catch (e) {
        console.error(e);
        alert("名前の変更に失敗しました。");
      }
    });

    selectMyStatus.addEventListener("change", async () => {
      const currentSelection = selectMyStatus.value;
      try {
        await updateDoc(doc(db, "users", currentUid), { settingStatus: currentSelection });
        runHeartbeatTick(currentSelection);
      } catch (e) { console.error(e); }
    });

    function runHeartbeatTick(statusType) {
      if (!currentUid) return;
      if (statusType === "online") {
        const farFuture = new Date("2099-12-31").getTime();
        updateDoc(doc(db, "users", currentUid), { lastActive: new Date(farFuture) });
      } else if (statusType === "offline") {
        const farPast = new Date("2000-01-01").getTime();
        updateDoc(doc(db, "users", currentUid), { lastActive: new Date(farPast) });
      } else {
        updateDoc(doc(db, "users", currentUid), { lastActive: serverTimestamp() });
      }
    }

    function startHeartbeat() {
      clearInterval(heartBeatInterval);
      runHeartbeatTick(selectMyStatus.value);
      heartBeatInterval = setInterval(() => {
        runHeartbeatTick(selectMyStatus.value);
      }, 10000);
    }

    async function loadGlobalHistory() {
      try {
        const historyRef = collection(db, "histories");
        const q = query(historyRef, where("uids", "array-contains", currentUid));
        
        onSnapshot(q, async (snapshot) => {
          if (snapshot.empty) {
            historyListContainer.innerHTML = "<div class='history-card'>履歴はありません</div>";
            return;
          }
          let rawList = [];
          snapshot.forEach(doc => { rawList.push(doc.data()); });
          rawList.sort((a, b) => {
            const timeA = a.timestamp ? a.timestamp.toDate().getTime() : 0;
            const timeB = b.timestamp ? b.timestamp.toDate().getTime() : 0;
            return timeB - timeA;
          });
          const displayList = rawList.slice(0, 5);
          let html = "";
          for (const hData of displayList) {
            const isWin = hData.winnerUid === currentUid;
            const enemyUid = hData.uids.find(id => id !== currentUid);
            const enemySnap = await getDoc(doc(db, "users", enemyUid));
            const enemyName = enemySnap.exists() ? enemySnap.data().username : "不明なプレイヤー";
            html += `
              <div class="history-card">
                <span class="${isWin ? 'win-text' : 'lose-text'}">[${isWin ? 'WIN' : 'LOSE'}]</span> 
                vs ${enemyName} <br>
                <small style="color:#777;">理由: ${hData.reason}</small>
              </div>
            `;
          }
          historyListContainer.innerHTML = html;
        });
      } catch (e) { console.error("履歴取得エラー:", e); }
    }

    async function showFriendStats(fUid, fName, fTag) {
      try {
        const historyRef = collection(db, "histories");
        const q = query(historyRef, where("uids", "array-contains", currentUid));
        const snapshot = await getDocs(q);
        let winCount = 0; let loseCount = 0;
        snapshot.forEach((doc) => {
          const data = doc.data();
          if (data.uids.includes(fUid)) {
            if (data.winnerUid === currentUid) winCount++; else loseCount++;
          }
        });
        alert(`📊 【${fName}#${fTag}】 との対戦戦績\n\nあなた: ${winCount} 勝 / ${loseCount} 敗`);
      } catch (e) { console.error(e); }
    }

    document.getElementById("btn-free").addEventListener("click", async () => {
      isFriendMatchMode = false;
      btnCancelInvite.classList.add("hidden"); 
      btnLeaveRoom.classList.remove("hidden"); 
      gameStatus.textContent = "対戦相手を探しています...";
      roomTitle.textContent = "自動マッチング中";
      showScreen("game");

      try {
        const roomsRef = collection(db, "rooms");
        const q = query(roomsRef, where("status", "==", "waiting"), orderBy("createdAt", "asc"));
        const querySnapshot = await getDocs(q);

        let targetRoomDoc = null;

        querySnapshot.forEach((doc) => {
          if (!targetRoomDoc && doc.id.startsWith("FREE_")) {
            const roomData = doc.data();
            if (!roomData.players.includes(currentUid)) {
              targetRoomDoc = doc;
            }
          }
        });

        if (targetRoomDoc) {
          const roomId = targetRoomDoc.id;
          const roomData = targetRoomDoc.data();
          
          // 【強化点】一瞬の差で他の人に先を越されていないか再チェック（満員判定）
          if (roomData.players.length >= 2 || roomData.status !== "waiting") {
            // 先を越されていた場合は、自分がホストになって部屋を作るフローへ流す
          } else {
            const updatedShingiCounts = { ...roomData.shingiCounts, [currentUid]: 0 };
            await updateDoc(doc(db, "rooms", roomId), {
              players: arrayUnion(currentUid),
              shingiCounts: updatedShingiCounts,
              status: "playing"
            });
            activeRoomId = roomId;
            watchRoom(roomId);
            return;
          }
        }

        let roomId = "FREE_" + Math.floor(1000 + Math.random() * 9000).toString();
        let roomRef = doc(db, "rooms", roomId);
        
        await setDoc(roomRef, {
          roomId: roomId,
          status: "waiting",
          players: [currentUid],
          createdAt: serverTimestamp(),
          lastWord: "しりとり",
          usedWords: ["しりとり"],
          currentTurn: currentUid,
          shingiCounts: { [currentUid]: 0 }
        });
        
        activeRoomId = roomId;
        watchRoom(roomId);
      } catch (error) {
        console.error(error);
        alert("マッチングに失敗しました。");
        showScreen("menu");
      }
    });

    function setupFriendsListener() {
      if (unsubscribeFriends) unsubscribeFriends();
      unsubscribeFriends = onSnapshot(doc(db, "users", currentUid), async (snapshot) => {
        if (!snapshot.exists()) return;
        const myData = snapshot.data();
        const friendUids = myData.friends || [];
        if (friendUids.length === 0) {
          friendListContainer.innerHTML = "<div class='friend-item'>フレンドはいません</div>";
          return;
        }
        let friendDataList = [];
        for (const fUid of friendUids) {
          const fSnap = await getDoc(doc(db, "users", fUid));
          if (fSnap.exists()) {
            const fData = fSnap.data();
            let isOnline = false;
            if (fData.lastActive) {
              const lastActiveTime = fData.lastActive.toDate().getTime();
              const nowTime = new Date().getTime();
              if (nowTime - lastActiveTime < 30000 || lastActiveTime > nowTime) { isOnline = true; }
            }
            fData.calculatedOnline = isOnline;
            friendDataList.push(fData);
          }
        }
        friendDataList.sort((a, b) => b.calculatedOnline - a.calculatedOnline);
        friendListContainer.innerHTML = "";
        friendDataList.forEach((fData) => {
          const itemDiv = document.createElement("div");
          itemDiv.className = "friend-item";
          itemDiv.innerHTML = `
            <div>
              👤 <span class="friend-name-link" id="link-${fData.uid}">${fData.username}</span>#${fData.userTag}
              <span class="status-badge ${fData.calculatedOnline ? 'status-online' : 'status-offline'}">${fData.calculatedOnline ? '● online' : '○ offline'}</span>
            </div>
          `;
          if (fData.calculatedOnline) {
            const inviteBtn = document.createElement("button");
            inviteBtn.className = "btn-invite"; inviteBtn.textContent = "対戦申込";
            inviteBtn.addEventListener("click", () => sendMatchInvite(fData.uid, fData.username));
            itemDiv.appendChild(inviteBtn);
          }
          friendListContainer.appendChild(itemDiv);
          document.getElementById(`link-${fData.uid}`).addEventListener("click", () => {
            showFriendStats(fData.uid, fData.username, fData.userTag);
          });
        });
      });
    }

    async function sendMatchInvite(targetUid, targetName) {
      const mySnap = await getDoc(doc(db, "users", currentUid));
      const myName = mySnap.exists() ? mySnap.data().username : "フレンド";
      if (!confirm(`${targetName} さんに対戦を申し込みますか？`)) return;
      
      let roomId = generateRoomId(); 
      let roomRef = doc(db, "rooms", roomId);
      let roomSnap = await getDoc(roomRef);
      while (roomSnap.exists()) {
        roomId = generateRoomId(); roomRef = doc(db, "rooms", roomId); roomSnap = await getDoc(roomRef);
      }
      await setDoc(roomRef, {
        roomId: roomId, status: "waiting", players: [currentUid], createdAt: serverTimestamp(), lastWord: "しりとり", usedWords: ["しりとり"], currentTurn: currentUid, shingiCounts: { [currentUid]: 0 }
      });

      const inviteId = "INV_" + generateRoomId();
      const inviteRef = doc(db, "users", targetUid, "invites", inviteId);
      await setDoc(inviteRef, { roomId: roomId, hostName: myName, createdAt: new Date() });

      currentSentInviteId = inviteId;
      currentSentInviteTargetUid = targetUid;

      isFriendMatchMode = true; activeRoomId = roomId;
      roomTitle.textContent = "フレンドマッチ待機中";
      gameStatus.textContent = `${targetName} さんの参加を受け付け中...`;
      
      btnCancelInvite.classList.remove("hidden");
      btnLeaveRoom.classList.add("hidden");

      showScreen("game"); watchRoom(roomId);
    }

    btnCancelInvite.addEventListener("click", async () => {
      if (!confirm("対戦申し込みを取り消しますか？")) return;
      
      btnCancelInvite.classList.add("hidden");
      btnLeaveRoom.classList.remove("hidden"); 
      clearInterval(countdownInterval);

      try {
        if (currentSentInviteTargetUid && currentSentInviteId) {
          const inviteRef = doc(db, "users", currentSentInviteTargetUid, "invites", currentSentInviteId);
          await deleteDoc(inviteRef);
        }

        if (activeRoomId) {
          const roomRef = doc(db, "rooms", activeRoomId);
          await updateDoc(roomRef, {
            status: "finished",
            winnerName: "メニュー",
            finishReason: "CANCELED" 
          });
        }
      } catch (e) { console.error("招待取り消しエラー:", e); }

      currentSentInviteId = null;
      currentSentInviteTargetUid = null;
    });

    function setupInviteListener() {
      if (unsubscribeInvite) unsubscribeInvite();
      const invitesRef = collection(db, "users", currentUid, "invites");
      
      unsubscribeInvite = onSnapshot(invitesRef, (snapshot) => {
        if (snapshot.empty) {
          inviteZone.classList.add("hidden");
          incomingRoomId = null;
          return;
        }

        snapshot.docChanges().forEach(async (change) => {
          if (change.type === "added") {
            const inviteData = change.doc.data();
            const targetInviteRoomId = inviteData.roomId.toUpperCase();
            const currentInviteDocRef = change.doc.ref;

            const roomSnap = await getDoc(doc(db, "rooms", targetInviteRoomId));
            if (!roomSnap.exists()) return;

            inviteMsgText.textContent = `⚔️ ${inviteData.hostName} から対戦申し込みが届きました！`;
            
            btnAcceptInvite.onclick = async () => {
              inviteZone.classList.add("hidden");
              await deleteDoc(currentInviteDocRef); 

              const roomRef = doc(db, "rooms", targetInviteRoomId);
              const freshSnap = await getDoc(roomRef);
              if (!freshSnap.exists() || freshSnap.data().status === "finished") {
                return alert("この招待は既に取り消されたか、解散されています。");
              }

              const rData = freshSnap.data();
              const updatedShingiCounts = { ...rData.shingiCounts, [currentUid]: 0 };
              await updateDoc(roomRef, { players: arrayUnion(currentUid), shingiCounts: updatedShingiCounts, status: "playing" });
              isFriendMatchMode = true; activeRoomId = targetInviteRoomId;
              roomTitle.textContent = "フレンドマッチ";
              
              btnLeaveRoom.classList.remove("hidden"); 

              showScreen("game"); watchRoom(targetInviteRoomId);
              incomingRoomId = null;
            };

            btnDeclineInvite.onclick = async () => {
              inviteZone.classList.add("hidden");
              await deleteDoc(currentInviteDocRef); 

              const roomRef = doc(db, "rooms", targetInviteRoomId);
              if ((await getDoc(roomRef)).exists()) {
                const mySnap = await getDoc(doc(db, "users", currentUid));
                const myName = mySnap.exists() ? mySnap.data().username : "相手";
                await updateDoc(roomRef, { status: "finished", winnerName: "メニュー", finishReason: `REFUSED:${myName}` });
              }
              incomingRoomId = null;
            };

            inviteZone.classList.remove("hidden");
          }
        });
      });
    }

    document.getElementById("btn-to-friend").addEventListener("click", () => showScreen("friend"));
    document.getElementById("btn-friend-back").addEventListener("click", () => showScreen("menu"));

    document.getElementById("btn-create-room").addEventListener("click", async () => {
      if (!currentUid) return alert("ログインしてください");
      isFriendMatchMode = false;
      btnCancelInvite.classList.add("hidden");
      btnLeaveRoom.classList.remove("hidden");
      let roomId = generateUserTag();
      let roomRef = doc(db, "rooms", roomId);
      try {
        let roomSnap = await getDoc(roomRef);
        while (roomSnap.exists()) { roomId = generateUserTag(); roomRef = doc(db, "rooms", roomId); roomSnap = await getDoc(roomRef); }
        await setDoc(roomRef, {
          roomId: roomId, status: "waiting", players: [currentUid], createdAt: serverTimestamp(), lastWord: "しりとり", usedWords: ["しりとり"], currentTurn: currentUid, shingiCounts: { [currentUid]: 0 }
        });
        activeRoomId = roomId; roomTitle.textContent = `部屋ID: ${roomId}`; showScreen("game"); watchRoom(roomId);
      } catch (error) { console.error(error); }
    });

    document.getElementById("btn-join-room").addEventListener("click", async () => {
      if (!currentUid) return alert("ログインしてください");
      isFriendMatchMode = false;
      btnCancelInvite.classList.add("hidden");
      btnLeaveRoom.classList.remove("hidden");
      const targetRoomId = roomIdInput.value.trim().toUpperCase();
      if (!targetRoomId || targetRoomId.length !== 4) return alert("正しい4桁の部屋IDを入力してください");
      const roomRef = doc(db, "rooms", targetRoomId);
      try {
        const roomSnap = await getDoc(roomRef);
        if (!roomSnap.exists()) return alert("指定された部屋が見つかりません。");
        const roomData = roomSnap.data();
        if (roomData.status !== "waiting" || roomData.players.length >= 2) return alert("入れません。");
        if (roomData.players.includes(currentUid)) return alert("すでに入室しています。");
        const updatedShingiCounts = { ...roomData.shingiCounts, [currentUid]: 0 };
        await updateDoc(roomRef, { players: arrayUnion(currentUid), shingiCounts: updatedShingiCounts, status: "playing" });
        activeRoomId = targetRoomId; roomTitle.textContent = `部屋ID: ${targetRoomId}`; showScreen("game"); watchRoom(targetRoomId);
      } catch (error) { console.error(error); }
    });

    function startLocalTimer(roomData) {
      clearInterval(countdownInterval); remainingTime = 15; timerBox.textContent = `残り時間: ${remainingTime}秒`;
      countdownInterval = setInterval(async () => {
        remainingTime--;
        if (roomData.currentTurn === currentUid) {
          timerBox.textContent = `残り時間: ${remainingTime}秒`;
        } else {
          timerBox.textContent = `相手の思考中... (${remainingTime}秒)`;
        }

        if (remainingTime <= 0) {
          clearInterval(countdownInterval);
          const roomRef = doc(db, "rooms", activeRoomId);
          try {
            const enemyUid = roomData.players.find(uid => uid !== currentUid);
            const enemySnap = await getDoc(doc(db, "users", enemyUid));
            const enemyName = enemySnap.exists() ? enemySnap.data().username : "対戦相手";
            const mySnap = await getDoc(doc(db, "users", currentUid));
            const myName = mySnap.exists() ? mySnap.data().username : "あなた";

            if (roomData.currentTurn === currentUid) {
              await updateDoc(roomRef, { 
                status: "finished", winnerName: enemyName, winnerUid: enemyUid, finishReason: `${myName} さんの思考時間が15秒を超えた（時間切れ）ため` 
              });
            } else {
              await updateDoc(roomRef, { 
                status: "finished", winnerName: myName, winnerUid: currentUid, finishReason: `${enemyName} さんの思考時間が15秒を超えた（時間切れ）ため` 
              });
            }
          } catch (e) { console.error(e); }
        }
      }, 1000);
    }

    function watchRoom(roomId) {
      if (unsubscribeRoom) unsubscribeRoom();
      isHistorySaved = false;
      
      unsubscribeRoom = onSnapshot(doc(db, "rooms", roomId), (snapshot) => {
        if (!snapshot.exists()) return;
        const data = snapshot.data();
        if (data.players) currentRoomPlayers = data.players;

        if (data.status === "waiting") {
          if (isFriendMatchMode) { 
            roomTitle.textContent = "フレンドマッチ待機中"; 
          } 
          else if (roomId.startsWith("FREE_")) { 
            roomTitle.textContent = "自動マッチング待機中"; gameStatus.textContent = "誰かが参加するのを待っています..."; 
          }
          else { roomTitle.textContent = `部屋ID: ${data.roomId}`; gameStatus.textContent = "相手の参加を待っています..."; }
          shiritoriArea.classList.add("hidden");
          clearInterval(countdownInterval);
        } 
        else if (data.status === "playing") {
          btnCancelInvite.classList.add("hidden");
          btnLeaveRoom.classList.remove("hidden"); 

          gameStatus.textContent = "試合中！";
          if (isFriendMatchMode) { roomTitle.textContent = "フレンドマッチ"; } 
          else if (roomId.startsWith("FREE_")) { roomTitle.textContent = "フリー自動対戦"; }
          else { roomTitle.textContent = `部屋ID: ${data.roomId}`; }
          shiritoriArea.classList.remove("hidden");
          currentWord.textContent = data.lastWord || "しりとり";
          
          const myUsedShingi = data.shingiCounts && data.shingiCounts[currentUid] ? data.shingiCounts[currentUid] : 0;
          const shingiRemaining = 10 - myUsedShingi;
          shingiCounter.textContent = `審議残り: ${shingiRemaining >= 0 ? shingiRemaining : 0}回`;

          if (data.currentTurn === currentUid) {
            turnIndicator.textContent = "あなたの番です！"; turnIndicator.className = "turn-badge my-turn";
            shiritoriInput.disabled = false; btnSendWord.disabled = false; btnShingi.disabled = true;
          } else {
            turnIndicator.textContent = "相手の番です..."; turnIndicator.className = "turn-badge enemy-turn";
            shiritoriInput.disabled = true; btnSendWord.disabled = true; btnShingi.disabled = false;
          }
          startLocalTimer(data);
        } 
        else if (data.status === "finished") {
          clearInterval(countdownInterval);
          if (unsubscribeRoom) { unsubscribeRoom(); unsubscribeRoom = null; } // 【強化点】即時監視解除
          btnCancelInvite.classList.add("hidden");
          btnLeaveRoom.classList.remove("hidden");

          if (data.finishReason === "CANCELED") {
            alert("対戦申し込みを取り消しました。");
          } else if (data.finishReason && data.finishReason.startsWith("REFUSED:")) {
            alert(`対戦申し込みを辞退されました。`);
          } else {
            alert(`ゲーム終了！ 勝者: ${data.winnerName} 👑\n理由: ${data.finishReason}`);
            if (!isHistorySaved && currentRoomPlayers.length === 2) {
              isHistorySaved = true;
              if (currentRoomPlayers[0] === currentUid) {
                try {
                  setDoc(doc(collection(db, "histories")), {
                    uids: currentRoomPlayers, winnerUid: data.winnerUid, reason: data.finishReason, timestamp: serverTimestamp()
                  });
                } catch (err) { console.error("履歴書き込み失敗:", err); }
              }
            }
          }
          currentSentInviteId = null;
          currentSentInviteTargetUid = null;
          activeRoomId = null; // ルームID初期化
          showScreen("menu");
        }
      });
    }

    btnSendWord.addEventListener("click", async () => {
      let input = shiritoriInput.value.trim();
      if (!input) return;
      if (!/^[ぁ-んー]+$/.test(input)) return alert("ひらがなだけで入力してください！");
      
      const roomRef = doc(db, "rooms", activeRoomId);
      try {
        const roomSnap = await getDoc(roomRef);
        const roomData = roomSnap.data();
        const lastWord = roomData.lastWord; 
        
        const usedWordsList = roomData.usedWords || ["しりとり"];
        if (usedWordsList.includes(input)) {
          return alert(`「${input}」はすでにこの試合で使われています！別の単語を出してください。`);
        }

        let lastChar = lastWord.slice(-1);
        if (lastChar === "ー" && lastWord.length > 1) lastChar = lastWord.slice(-2, -1);
        
        let requiredStartChar = lastChar;
        if (smallToLargeMap[lastChar]) { requiredStartChar = smallToLargeMap[lastChar]; }

        if (lastWord && requiredStartChar !== input.charAt(0)) {
          return alert(`「${requiredStartChar}」から始まる単語を入力してください！`);
        }

        clearInterval(countdownInterval);
        const enemyUid = roomData.players.find(uid => uid !== currentUid);

        if (input.slice(-1) === "ん") {
          const enemySnap = await getDoc(doc(db, "users", enemyUid));
          const enemyName = enemySnap.exists() ? enemySnap.data().username : "対戦相手";
          await updateDoc(roomRef, {
            status: "finished", winnerName: enemyName, winnerUid: enemyUid, finishReason: `「ん」のつく単語を送信したため`
          });
          shiritoriInput.value = ""; return;
        }
        
        const nextTurnUid = roomData.players.find(uid => uid !== currentUid);
        await updateDoc(roomRef, { 
          lastWord: input, usedWords: arrayUnion(input), currentTurn: nextTurnUid, lastSenderUid: currentUid 
        });
        shiritoriInput.value = ""; 
      } catch (error) { console.error(error); }
    });

    btnShingi.addEventListener("click", async () => {
      const roomRef = doc(db, "rooms", activeRoomId);
      try {
        const roomSnap = await getDoc(roomRef);
        const roomData = roomSnap.data();
        const currentShingiCount = roomData.shingiCounts && roomData.shingiCounts[currentUid] ? roomData.shingiCounts[currentUid] : 0;
        const nextTurnUid = roomData.players.find(uid => uid !== currentUid);

        if (!confirm(`相手が出した単語「${roomData.lastWord}」を物言いにし、やり直しを求めますか？`)) return;

        clearInterval(countdownInterval);
        const updatedCounts = { ...roomData.shingiCounts, [currentUid]: currentShingiCount + 1 };

        const wordsList = roomData.usedWords || ["しりとり"];
        if (wordsList.length > 1) { wordsList.pop(); }
        const rolledBackWord = wordsList[wordsList.length - 1] || "しりとり";

        await updateDoc(roomRef, {
          shingiCounts: updatedCounts, currentTurn: nextTurnUid, lastWord: rolledBackWord, usedWords: wordsList
        });

        alert("審議が通り、相手にターンが差し戻されました！次の単語を待っています。");
      } catch (error) { console.error(error); }
    });

    btnRetire.addEventListener("click", async () => {
      if (!confirm("本当にリタイア（降参）しますか？")) return;
      clearInterval(countdownInterval);
      const roomRef = doc(db, "rooms", activeRoomId);
      try {
        const roomSnap = await getDoc(roomRef);
        const roomData = roomSnap.data();
        const enemyUid = roomData.players.find(uid => uid !== currentUid);
        const enemySnap = await getDoc(doc(db, "users", enemyUid));
        const enemyName = enemySnap.exists() ? enemySnap.data().username : "対戦相手";
        await updateDoc(roomRef, { 
          status: "finished", winnerName: enemyName, winnerUid: enemyUid, finishReason: `対戦相手がゲームを途中でリタイア（降参）したため` 
        });
      } catch (error) { console.error(error); }
    });

    // ─── 【重要修正】メニューに戻るボタンを押した時の「待機部屋削除」と「監視強制カット」 ───
    document.getElementById("btn-leave").addEventListener("click", async () => {
      clearInterval(countdownInterval);
      
      if (activeRoomId) {
        const roomRef = doc(db, "rooms", activeRoomId);
        try {
          const roomSnap = await getDoc(roomRef);
          if (roomSnap.exists()) {
            const roomData = roomSnap.data();
            
            // ① 【確定強化】オートマッチ待機中（waiting）だった場合は、データベースから部屋をごと完全に消去して跡形もなくす
            if (roomData.status === "waiting" && activeRoomId.startsWith("FREE_")) {
              if (unsubscribeRoom) { unsubscribeRoom(); unsubscribeRoom = null; } // 即時切断
              await deleteDoc(roomRef);
            } 
            // ② 試合中（playing）だった場合は、これまで通りペナルティ処理
            else if (roomData.status === "playing") {
              const enemyUid = roomData.players.find(uid => uid !== currentUid);
              const enemySnap = await getDoc(doc(db, "users", enemyUid));
              const enemyName = enemySnap.exists() ? enemySnap.data().username : "対戦相手";
              await updateDoc(roomRef, {
                status: "finished", winnerName: enemyName, winnerUid: enemyUid, finishReason: `対戦相手が試合の途中でメニューに戻り、切断したため`
              });
            }
          }
        } catch (e) { console.error(e); }
      }
      
      // ③ メニューに戻る瞬間に、今見ている部屋のリスナー監視を完全に断ち切る
      if (unsubscribeRoom) { unsubscribeRoom(); unsubscribeRoom = null; }
      activeRoomId = null;
      showScreen("menu");
    });

    function showScreen(screenType) {
      loginScreen.classList.add("hidden"); registerScreen.classList.add("hidden"); menuScreen.classList.add("hidden"); gameScreen.classList.add("hidden"); friendScreen.classList.add("hidden");
      if (screenType === "login") loginScreen.classList.remove("hidden");
      if (screenType === "register") registerScreen.classList.remove("hidden");
      if (screenType === "menu") menuScreen.classList.remove("hidden");
      if (screenType === "game") gameScreen.classList.remove("hidden"); 
      if (screenType === "friend") friendScreen.classList.remove("hidden");
    }
  </script>
</body>
</html>
