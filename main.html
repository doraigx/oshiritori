<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>しりとりアプリ - 完全対戦版</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
      width: 90%;
      max-width: 400px;
    }
    h1 { color: #333; margin-bottom: 24px; }
    h3 { color: #555; text-align: left; margin-top: 20px; margin-bottom: 10px; }
    button {
      background-color: #4285f4;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover { background-color: #357ae8; }
    input[type="text"] {
      box-sizing: border-box;
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    .hidden { display: none; }
    .user-info { margin-bottom: 20px; font-weight: bold; color: #555; text-align: left; }
    
    .flex-group {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .flex-group input { margin-bottom: 0; flex: 2; }
    .flex-group button { flex: 1; padding: 12px 10px; font-size: 14px; }

    /* しりとり用のスタイル */
    .word-display {
      font-size: 32px;
      font-weight: bold;
      color: #333;
      margin: 20px 0;
      background: #f0f4f8;
      padding: 15px;
      border-radius: 8px;
    }
    .turn-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 15px;
    }
    .my-turn { background-color: #e6f4ea; color: #137333; }
    .enemy-turn { background-color: #fce8e6; color: #c5221f; }
    
    /* 特殊アクションボタン用スタイル */
    .action-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .btn-action {
      font-size: 14px;
      padding: 10px;
    }
    .shingi-count-text {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>しりとりポータル</h1>

    <!-- 1. 初期ログイン画面 -->
    <div id="login-screen">
      <p>ゲームを始めるにはGoogleアカウントでログインしてください。</p>
      <button id="btn-login">Googleでログイン</button>
    </div>

    <!-- 2. 初回のみ表示されるユーザーネーム登録画面 -->
    <div id="register-screen" class="hidden">
      <p>ユーザーネームを決めてください</p>
      <input type="text" id="username-input" placeholder="例: どーらい">
      <button id="btn-register">登録して次へ</button>
    </div>

    <!-- 3. ログイン完了後のメインメニュー画面 -->
    <div id="menu-screen" class="hidden">
      <div class="user-info" id="user-display"></div>
      <hr>
      
      <h3>【対人モード】</h3>
      <button id="btn-create-room" style="background-color: #f4b400; margin-bottom: 15px;">新しく部屋を作る（4桁ID発行）</button>
      
      <div class="flex-group">
        <input type="text" id="room-id-input" placeholder="4桁の部屋IDを入力">
        <button id="btn-join-room" style="background-color: #4285f4;">部屋に入る</button>
      </div>
      
      <hr>
      <h3>【フリーモード】</h3>
      <button id="btn-free" style="background-color: #34a853;">フリーモード（全世界共通）</button>
    </div>

    <!-- 4. 对戦メイン画面 -->
    <div id="game-screen" class="hidden">
      <h2 id="room-title">部屋ID: ----</h2>
      <div id="game-status" style="font-weight: bold; color: #555;">相手の参加を待っています...</div>
      
      <div id="shiritori-area" class="hidden">
        <div id="turn-indicator" class="turn-badge">読み込み中...</div>
        <div class="word-display" id="current-word">ーーー</div>
        
        <div class="flex-group">
          <input type="text" id="shiritori-input" placeholder="次の単語を入力（ひらがな）">
          <button id="btn-send-word" style="background-color: #34a853;">送信</button>
        </div>

        <!-- 審議とリタイアボタン -->
        <div class="action-group">
          <div style="flex: 1;">
            <button id="btn-shingi" class="btn-action" style="background-color: #ff9800;">🤔 審議 (ダウト)</button>
            <div id="shingi-counter" class="shingi-count-text">審議残り: 10回</div>
          </div>
          <div style="flex: 1;">
            <button id="btn-retire" class="btn-action" style="background-color: #ea4335;">🏳️ リタイア</button>
          </div>
        </div>
      </div>
      
      <button id="btn-leave" style="background-color: #888; margin-top: 20px;">メニューに戻る</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDFeeG0cXom0TBmUngUDbBf_0CqKVRqKwg",
      authDomain: "oshiritori.firebaseapp.com",
      projectId: "oshiritori",
      storageBucket: "oshiritori.firebasestorage.app",
      messagingSenderId: "947062662188",
      appId: "1:947062662188:web:362b7ccff6e01a5ecd9d89",
      measurementId: "G-15T7LNJG2J"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const loginScreen = document.getElementById("login-screen");
    const registerScreen = document.getElementById("register-screen");
    const menuScreen = document.getElementById("menu-screen");
    const gameScreen = document.getElementById("game-screen");
    
    const usernameInput = document.getElementById("username-input");
    const userDisplay = document.getElementById("user-display");
    const roomIdInput = document.getElementById("room-id-input");
    const roomTitle = document.getElementById("room-title");
    const gameStatus = document.getElementById("game-status");

    const shiritoriArea = document.getElementById("shiritori-area");
    const turnIndicator = document.getElementById("turn-indicator");
    const currentWord = document.getElementById("current-word");
    const shiritoriInput = document.getElementById("shiritori-input");
    const btnSendWord = document.getElementById("btn-send-word");
    const btnShingi = document.getElementById("btn-shingi");
    const btnRetire = document.getElementById("btn-retire");
    const shingiCounter = document.getElementById("shingi-counter");

    let currentUid = null;
    let activeRoomId = null;
    let unsubscribeRoom = null;

    document.getElementById("btn-login").addEventListener("click", async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        currentUid = result.user.uid;
        await checkUserRegistered(result.user.uid);
      } catch (error) {
        console.error("ログインに失敗しました:", error);
        alert("ログインエラーが発生しました。");
      }
    });

    async function checkUserRegistered(uid) {
      const userRef = doc(db, "users", uid);
      const userSnap = await getDoc(userRef);

      if (userSnap.exists()) {
        const userData = userSnap.data();
        showScreen("menu");
        userDisplay.textContent = `プレイヤー: ${userData.username}`;
      } else {
        showScreen("register");
      }
    }

    document.getElementById("btn-register").addEventListener("click", async () => {
      const name = usernameInput.value.trim();
      if (!name) return alert("名前を入力してください。");

      try {
        await setDoc(doc(db, "users", currentUid), {
          uid: currentUid,
          username: name,
          createdAt: new Date()
        });
        showScreen("menu");
        userDisplay.textContent = `プレイヤー: ${name}`;
      } catch (error) {
        console.error("登録に失敗しました:", error);
        alert("ユーザー登録に失敗しました。");
      }
    });

    function generateRoomId() {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let result = "";
      for (let i = 0; i < 4; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }

    document.getElementById("btn-create-room").addEventListener("click", async () => {
      if (!currentUid) return alert("ログインしてください");

      let roomId = generateRoomId();
      let roomRef = doc(db, "rooms", roomId);
      
      try {
        let roomSnap = await getDoc(roomRef);
        while (roomSnap.exists()) {
          roomId = generateRoomId();
          roomRef = doc(db, "rooms", roomId);
          roomSnap = await getDoc(roomRef);
        }

        // 変更：初期データに各プレイヤーの審議回数（初期値0）を持たせる
        await setDoc(roomRef, {
          roomId: roomId,
          status: "waiting",
          players: [currentUid],
          createdAt: new Date(),
          lastWord: "しりとり",
          currentTurn: currentUid,
          shingiCounts: {
            [currentUid]: 0
          }
        });

        activeRoomId = roomId;
        roomTitle.textContent = `部屋ID: ${roomId}`;
        showScreen("game");
        watchRoom(roomId);

      } catch (error) {
        console.error("部屋の作成に失敗:", error);
        alert("部屋の作成に失敗しました。");
      }
    });

    document.getElementById("btn-join-room").addEventListener("click", async () => {
      if (!currentUid) return alert("ログインしてください");
      
      const targetRoomId = roomIdInput.value.trim().toUpperCase();
      if (!targetRoomId || targetRoomId.length !== 4) return alert("正しい4桁の部屋IDを入力してください");

      const roomRef = doc(db, "rooms", targetRoomId);
      
      try {
        const roomSnap = await getDoc(roomRef);
        if (!roomSnap.exists()) return alert("指定された部屋が見つかりません。");

        const roomData = roomSnap.data();
        if (roomData.status !== "waiting" || roomData.players.length >= 2) {
          return alert("この部屋はすでに満員か、試合が始まっています。");
        }
        if (roomData.players.includes(currentUid)) return alert("すでに入室しています。");

        // 変更：入室時に自分の審議カウント（0）をマップに追加
        const updatedShingiCounts = { ...roomData.shingiCounts, [currentUid]: 0 };

        await updateDoc(roomRef, {
          players: arrayUnion(currentUid),
          shingiCounts: updatedShingiCounts,
          status: "playing"
        });

        activeRoomId = targetRoomId;
        roomTitle.textContent = `部屋ID: ${targetRoomId}`;
        showScreen("game");
        watchRoom(targetRoomId);

      } catch (error) {
        console.error("部屋への参加に失敗:", error);
        alert("部屋への参加に失敗しました。");
      }
    });

    function watchRoom(roomId) {
      if (unsubscribeRoom) unsubscribeRoom();

      unsubscribeRoom = onSnapshot(doc(db, "rooms", roomId), (snapshot) => {
        if (!snapshot.exists()) return;
        
        const data = snapshot.data();
        
        if (data.status === "waiting") {
          gameStatus.textContent = "相手の参加を待っています...（このIDを友達に伝えてね）";
          shiritoriArea.classList.add("hidden");
        } 
        
        else if (data.status === "playing") {
          gameStatus.textContent = "試合中！";
          shiritoriArea.classList.remove("hidden");
          
          currentWord.textContent = data.lastWord || "しりとり";
          
          // 追加：現在の自分の審議残り回数を計算して表示
          const myUsedShingi = data.shingiCounts && data.shingiCounts[currentUid] ? data.shingiCounts[currentUid] : 0;
          const shingiRemaining = 10 - myUsedShingi;
          shingiCounter.textContent = `審議残り: ${shingiRemaining >= 0 ? shingiRemaining : 0}回`;

          if (data.currentTurn === currentUid) {
            turnIndicator.textContent = "あなたの番です！";
            turnIndicator.className = "turn-badge my-turn";
            shiritoriInput.disabled = false;
            btnSendWord.disabled = false;
            btnShingi.disabled = true; // 自分の番は審議できない
          } else {
            turnIndicator.textContent = "相手の番です...";
            turnIndicator.className = "turn-badge enemy-turn";
            shiritoriInput.disabled = true;
            btnSendWord.disabled = true;
            btnShingi.disabled = false; // 相手の番（相手が打った直後）に審議できる
          }
        }
        
        else if (data.status === "finished") {
          alert(`ゲーム終了！ 勝者: ${data.winnerName} 👑\n理由: ${data.finishReason}`);
          if (unsubscribeRoom) unsubscribeRoom();
          showScreen("menu");
        }
      });
    }

    btnSendWord.addEventListener("click", async () => {
      let input = shiritoriInput.value.trim();
      if (!input) return;

      if (!/^[ぁ-んー]+$/.test(input)) {
        return alert("ひらがなだけで入力してください！");
      }
      if (input.length < 2) {
        return alert("2文字以上で入力してください！");
      }

      const roomRef = doc(db, "rooms", activeRoomId);
      
      try {
        const roomSnap = await getDoc(roomRef);
        const roomData = roomSnap.data();
        const lastWord = roomData.lastWord; 
        
        let lastChar = lastWord.slice(-1);
        if (lastChar === "ー" && lastWord.length > 1) {
          lastChar = lastWord.slice(-2, -1);
        }
        
        const firstChar = input.charAt(0);

        if (lastWord && lastChar !== firstChar) {
          return alert(`前の単語の末尾は「${lastChar}」です。「${lastChar}」から始まる単語を入力してください！`);
        }

        if (input.slice(-1) === "ん") {
          const mySnap = await getDoc(doc(db, "users", currentUid));
          const myName = mySnap.exists() ? mySnap.data().username : "相手";
          
          const enemyUid = roomData.players.find(uid => uid !== currentUid);
          const enemySnap = await getDoc(doc(db, "users", enemyUid));
          const enemyName = enemySnap.exists() ? enemySnap.data().username : "対戦相手";

          await updateDoc(roomRef, {
            status: "finished",
            winnerName: enemyName,
            finishReason: `${myName} さんが「ん」のつく単語を送信したため`
          });
          shiritoriInput.value = "";
          return;
        }

        const nextTurnUid = roomData.players.find(uid => uid !== currentUid);

        await updateDoc(roomRef, {
          lastWord: input,
          currentTurn: nextTurnUid,
          lastSenderUid: currentUid
        });

        shiritoriInput.value = ""; 
      } catch (error) {
        console.error("ワード送信エラー:", error);
      }
    });

    // ─── 変更：審議（ダウト）ボタンの処理 ───
    btnShingi.addEventListener("click", async () => {
      const roomRef = doc(db, "rooms", activeRoomId);
      try {
        const roomSnap = await getDoc(roomRef);
        const roomData = roomSnap.data();
        
        // 現在の自分の審議回数を取得
        const currentShingiCount = roomData.shingiCounts && roomData.shingiCounts[currentUid] ? roomData.shingiCounts[currentUid] : 0;
        
        const mySnap = await getDoc(doc(db, "users", currentUid));
        const myName = mySnap.exists() ? mySnap.data().username : "あなた";

        const enemyUid = roomData.players.find(uid => uid !== currentUid);
        const enemySnap = await getDoc(doc(db, "users", enemyUid));
        const enemyName = enemySnap.exists() ? enemySnap.data().username : "対戦相手";

        // 【最重要】すでに10回審議を行っている状態で、さらに押した場合（11回目）
        if (currentShingiCount >= 10) {
          alert("審議可能回数（10回）を超えて審議を繰り返したため、ペナルティであなたの負けになります！");
          await updateDoc(roomRef, {
            status: "finished",
            winnerName: enemyName,
            finishReason: `${myName} さんが上限を超えて審議（乱発）を繰り返したため`
          });
          return;
        }

        // 通常の審議確認（1〜10回目）
        if (!confirm(`相手の単語を『存在しない単語』として審議しますか？\n（残り審議回数: ${10 - currentShingiCount}回）`)) return;

        // 審議回数を1プラスする
        const updatedCounts = { ...roomData.shingiCounts, [currentUid]: currentShingiCount + 1 };

        // 審議判定：直前に送信した相手を負けにし、ゲーム終了
        await updateDoc(roomRef, {
          shingiCounts: updatedCounts,
          status: "finished",
          winnerName: myName,
          finishReason: `出された単語「${roomData.lastWord}」がリアル審議により無効となったため`
        });
      } catch (error) {
        console.error("審議エラー:", error);
      }
    });

    btnRetire.addEventListener("click", async () => {
      if (!confirm("本当にリタイア（降参）しますか？")) return;

      const roomRef = doc(db, "rooms", activeRoomId);
      try {
        const roomSnap = await getDoc(roomRef);
        const roomData = roomSnap.data();
        
        const enemyUid = roomData.players.find(uid => uid !== currentUid);
        const enemySnap = await getDoc(doc(db, "users", enemyUid));
        const enemyName = enemySnap.exists() ? enemySnap.data().username : "対戦相手";

        await updateDoc(roomRef, {
          status: "finished",
          winnerName: enemyName,
          finishReason: `対戦相手がリタイア（降参）したため`
        });
      } catch (error) {
        console.error("リタイアエラー:", error);
      }
    });

    document.getElementById("btn-leave").addEventListener("click", () => {
      if (unsubscribeRoom) {
        unsubscribeRoom();
        unsubscribeRoom = null;
      }
      showScreen("menu");
    });

    function showScreen(screenType) {
      loginScreen.classList.add("hidden");
      registerScreen.classList.add("hidden");
      menuScreen.classList.add("hidden");
      gameScreen.classList.add("hidden");

      if (screenType === "login") loginScreen.classList.remove("hidden");
      if (screenType === "register") registerScreen.classList.remove("hidden");
      if (screenType === "menu") menuScreen.classList.remove("hidden");
      if (screenType === "game") gameScreen.classList.remove("hidden");
    }
  </script>
</body>
</html>
