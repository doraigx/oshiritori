<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>しりとりアプリ - オンライン対戦招待版</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px 0;
      box-sizing: border-box;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
      width: 90%;
      max-width: 400px;
    }
    h1 { color: #333; margin-bottom: 24px; }
    h3 { color: #555; text-align: left; margin-top: 20px; margin-bottom: 10px; }
    button {
      background-color: #4285f4;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover { background-color: #357ae8; }
    input[type="text"] {
      box-sizing: border-box;
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    .hidden { display: none; }
    .user-info { margin-bottom: 20px; font-weight: bold; color: #555; text-align: left; }
    
    .flex-group {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .flex-group input { margin-bottom: 0; flex: 2; }
    .flex-group button { flex: 1; padding: 12px 10px; font-size: 14px; }

    /* しりとり用のスタイル */
    .word-display {
      font-size: 32px;
      font-weight: bold;
      color: #333;
      margin: 20px 0;
      background: #f0f4f8;
      padding: 15px;
      border-radius: 8px;
    }
    .turn-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 15px;
    }
    .my-turn { background-color: #e6f4ea; color: #137333; }
    .enemy-turn { background-color: #fce8e6; color: #c5221f; }
    
    .timer-display {
      font-size: 24px;
      font-weight: bold;
      color: #ea4335;
      margin-bottom: 15px;
      background: #fff5f5;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #fcedeb;
    }

    .action-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .btn-action {
      font-size: 14px;
      padding: 10px;
    }
    .shingi-count-text {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    /* フレンド機能用のスタイル */
    .friend-list {
      text-align: left;
      background: #f9f9f9;
      padding: 10px;
      border-radius: 6px;
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 15px;
      border: 1px solid #eee;
    }
    .friend-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      color: #444;
      font-size: 14px;
    }
    .friend-item:last-child { border-bottom: none; }
    .status-badge {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: bold;
    }
    .status-online { background-color: #e6f4ea; color: #137333; }
    .status-offline { background-color: #f1f3f4; color: #5f6368; }
    .btn-invite {
      background-color: #34a853;
      font-size: 12px;
      padding: 6px 10px;
      width: auto;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>しりとりポータル</h1>

    <div id="login-screen">
      <p>ゲームを始めるにはGoogleアカウントでログインしてください。</p>
      <button id="btn-login">Googleでログイン</button>
    </div>

    <div id="register-screen" class="hidden">
      <p>ユーザーネームを決めてください</p>
      <input type="text" id="username-input" placeholder="例: どーらい">
      <button id="btn-register">登録して次へ</button>
    </div>

    <div id="menu-screen" class="hidden">
      <div class="user-info" id="user-display"></div>
      <button id="btn-to-friend" style="background-color: #9c27b0; margin-bottom: 15px; padding: 8px;">👥 フレンド画面・オンラインリスト</button>
      <hr>
      
      <h3>【対人モード】</h3>
      <button id="btn-create-room" style="background-color: #f4b400; margin-bottom: 15px;">新しく部屋を作る（4桁ID発行）</button>
      
      <div class="flex-group">
        <input type="text" id="room-id-input" placeholder="4桁の部屋IDを入力">
        <button id="btn-join-room" style="background-color: #4285f4;">部屋に入る</button>
      </div>
      
      <hr>
      <h3>【フリーモード】</h3>
      <button id="btn-free" style="background-color: #34a853;">フリーモード（全世界共通）</button>
    </div>

    <div id="friend-screen" class="hidden">
      <h2>フレンド・オンライン</h2>
      <div class="user-info" id="friend-my-tag" style="color: #9c27b0;">あなたのタグ: ----</div>
      
      <h3>フレンドリスト（オンライン優先）</h3>
      <div id="friend-list-container" class="friend-list">フレンドはいません</div>

      <h3>フレンド追加</h3>
      <p style="font-size: 12px; color: #666; text-align: left; margin-bottom: 5px;">相手の「名前#4桁数字」を入力してください</p>
      <div class="flex-group">
        <input type="text" id="friend-search-input" placeholder="例: どーらい#1234">
        <button id="btn-add-friend" style="background-color: #9c27b0;">追加</button>
      </div>
      
      <button id="btn-friend-back" style="background-color: #888; margin-top: 10px;">メニューに戻る</button>
    </div>

    <div id="game-screen" class="hidden">
      <h2 id="room-title">部屋ID: ----</h2>
      <div id="game-status" style="font-weight: bold; color: #555;">相手の参加を待っています...</div>
      
      <div id="shiritori-area" class="hidden">
        <div id="timer-box" class="timer-display">残り時間: 15秒</div>
        <div id="turn-indicator" class="turn-badge">読み込み中...</div>
        <div class="word-display" id="current-word">ーーー</div>
        
        <div class="flex-group">
          <input type="text" id="shiritori-input" placeholder="次の単語を入力（ひらがな）">
          <button id="btn-send-word" style="background-color: #34a853;">送信</button>
        </div>

        <div class="action-group">
          <div style="flex: 1;">
            <button id="btn-shingi" class="btn-action" style="background-color: #ff9800;">🤔 審議 (ダウト)</button>
            <div id="shingi-counter" class="shingi-count-text">審議残り: 10回</div>
          </div>
          <div style="flex: 1;">
            <button id="btn-retire" class="btn-action" style="background-color: #ea4335;">🏳️ リタイア</button>
          </div>
        </div>
      </div>
      
      <button id="btn-leave" style="background-color: #888; margin-top: 20px;">メニューに戻る</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDFeeG0cXom0TBmUngUDbBf_0CqKVRqKwg",
      authDomain: "oshiritori.firebaseapp.com",
      projectId: "oshiritori",
      storageBucket: "oshiritori.firebasestorage.app",
      messagingSenderId: "947062662188",
      appId: "1:947062662188:web:362b7ccff6e01a5ecd9d89",
      measurementId: "G-15T7LNJG2J"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const loginScreen = document.getElementById("login-screen");
    const registerScreen = document.getElementById("register-screen");
    const menuScreen = document.getElementById("menu-screen");
    const gameScreen = document.getElementById("game-screen");
    const friendScreen = document.getElementById("friend-screen");
    
    const usernameInput = document.getElementById("username-input");
    const userDisplay = document.getElementById("user-display");
    const roomIdInput = document.getElementById("room-id-input");
    const roomTitle = document.getElementById("room-title");
    const gameStatus = document.getElementById("game-status");

    const shiritoriArea = document.getElementById("shiritori-area");
    const turnIndicator = document.getElementById("turn-indicator");
    const currentWord = document.getElementById("current-word");
    const shiritoriInput = document.getElementById("shiritori-input");
    const btnSendWord = document.getElementById("btn-send-word");
    const btnShingi = document.getElementById("btn-shingi");
    const btnRetire = document.getElementById("btn-retire");
    const shingiCounter = document.getElementById("shingi-counter");
    const timerBox = document.getElementById("timer-box");

    const friendMyTag = document.getElementById("friend-my-tag");
    const friendListContainer = document.getElementById("friend-list-container");
    const friendSearchInput = document.getElementById("friend-search-input");

    let currentUid = null;
    let activeRoomId = null;
    let unsubscribeRoom = null;
    let unsubscribeFriends = null;
    let unsubscribeInvite = null;

    let countdownInterval = null;
    let remainingTime = 15;

    document.getElementById("btn-login").addEventListener("click", async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        currentUid = result.user.uid;
        await checkUserRegistered(result.user.uid);
      } catch (error) {
        console.error("ログインに失敗しました:", error);
        alert("ログインエラーが発生しました。");
      }
    });

    function generateUserTag() {
      return Math.floor(1000 + Math.random() * 9000).toString();
    }

    async function checkUserRegistered(uid) {
      const userRef = doc(db, "users", uid);
      const userSnap = await getDoc(userRef);

      if (userSnap.exists()) {
        let userData = userSnap.data();
        if (!userData.userTag || !userData.friends) {
          const autoTag = userData.userTag || generateUserTag();
          const autoFriends = userData.friends || [];
          await updateDoc(userRef, { userTag: autoTag, friends: autoFriends });
          const freshSnap = await getDoc(userRef);
          userData = freshSnap.data();
        }
        showScreen("menu");
        userDisplay.textContent = `プレイヤー: ${userData.username}#${userData.userTag}`;
        friendMyTag.textContent = `あなたのタグ: ${userData.username}#${userData.userTag}`;
        
        // ─── オンライン状態をON ＆ 招待・フレンドの監視開始 ───
        await updateDoc(userRef, { status: "online", inviteRoomId: "" });
        setupFriendsListener();
        setupInviteListener();
      } else {
        showScreen("register");
      }
    }

    document.getElementById("btn-register").addEventListener("click", async () => {
      const name = usernameInput.value.trim();
      if (!name) return alert("名前を入力してください。");
      if (name.includes("#")) return alert("名前に'#'は使用できません。");

      try {
        const tag = generateUserTag();
        await setDoc(doc(db, "users", currentUid), {
          uid: currentUid,
          username: name,
          userTag: tag,
          friends: [],
          status: "online",
          inviteRoomId: "",
          createdAt: new Date()
        });
        showScreen("menu");
        userDisplay.textContent = `プレイヤー: ${name}#${tag}`;
        friendMyTag.textContent = `あなたのタグ: ${name}#${tag}`;
        setupFriendsListener();
        setupInviteListener();
      } catch (error) {
        console.error(error);
      }
    });

    document.getElementById("btn-add-friend").addEventListener("click", async () => {
      const searchText = friendSearchInput.value.trim();
      if (!searchText.includes("#")) return alert("「名前#4桁数字」の形式で入力してください。");
      const [searchName, searchTag] = searchText.split("#");
      try {
        const usersRef = collection(db, "users");
        const q = query(usersRef, where("username", "==", searchName), where("userTag", "==", searchTag));
        const querySnapshot = await getDocs(q);
        if (querySnapshot.empty) return alert("指定されたユーザーが見つかりません。");
        let targetUid = null;
        querySnapshot.forEach((doc) => { targetUid = doc.id; });
        if (targetUid === currentUid) return alert("自分自身は追加できません。");

        await updateDoc(doc(db, "users", currentUid), { friends: arrayUnion(targetUid) });
        alert(`フレンドを追加しました！`);
        friendSearchInput.value = "";
      } catch (error) {
        console.error(error);
      }
    });

    // ─── 【新設】フレンド一覧 ＆ 各自のオンライン状況をリアルタイム同期 ───
    function setupFriendsListener() {
      if (unsubscribeFriends) unsubscribeFriends();
      unsubscribeFriends = onSnapshot(doc(db, "users", currentUid), async (snapshot) => {
        if (!snapshot.exists()) return;
        const myData = snapshot.data();
        const friendUids = myData.friends || [];
        if (friendUids.length === 0) {
          friendListContainer.innerHTML = "<div class='friend-item'>フレンドはいません</div>";
          return;
        }

        // フレンド全員の最新データを取得してリスト化
        let friendDataList = [];
        for (const fUid of friendUids) {
          const fSnap = await getDoc(doc(db, "users", fUid));
          if (fSnap.exists()) {
            friendDataList.push(fSnap.data());
          }
        }

        // オンラインのフレンドが上に来るように並び替え
        friendDataList.sort((a, b) => (b.status === "online" ? 1 : 0) - (a.status === "online" ? 1 : 0));

        friendListContainer.innerHTML = "";
        friendDataList.forEach((fData) => {
          const isOnline = fData.status === "online";
          const itemDiv = document.createElement("div");
          itemDiv.className = "friend-item";
          
          // 名前・タグ・状態バッジの作成
          itemDiv.innerHTML = `
            <div>
              👤 ${fData.username}#${fData.userTag}
              <span class="status-badge ${isOnline ? 'status-online' : 'status-offline'}">${isOnline ? '● online' : '○ offline'}</span>
            </div>
          `;

          // オンラインのフレンドの横にだけ「対戦申込」ボタンを作る
          if (isOnline) {
            const inviteBtn = document.createElement("button");
            inviteBtn.className = "btn-invite";
            inviteBtn.textContent = "対戦申込";
            inviteBtn.addEventListener("click", () => sendMatchInvite(fData.uid, fData.username));
            itemDiv.appendChild(inviteBtn);
          }

          friendListContainer.appendChild(itemDiv);
        });
      });
    }

    // ─── 【新設】オンラインフレンドへ直接対戦を申し込む（部屋を作って相手に通知） ───
    async function sendMatchInvite(targetUid, targetName) {
      if (!confirm(`${targetName} さんに対戦を申し込みますか？\n（相手が承認すると自動で試合が始まります）`)) return;
      
      // 1. 自動で4桁の部屋を作成
      let roomId = Math.floor(1000 + Math.random() * 9000).toString();
      let roomRef = doc(db, "rooms", roomId);
      let roomSnap = await getDoc(roomRef);
      while (roomSnap.exists()) {
        roomId = Math.floor(1000 + Math.random() * 9000).toString();
        roomRef = doc(db, "rooms", roomId);
        roomSnap = await getDoc(roomRef);
      }

      await setDoc(roomRef, {
        roomId: roomId,
        status: "waiting",
        players: [currentUid],
        createdAt: new Date(),
        lastWord: "しりとり",
        currentTurn: currentUid,
        shingiCounts: { [currentUid]: 0 }
      });

      // 2. 相手のデータにある「inviteRoomId」の空き地に、作った部屋IDを書き込んで通知を送る
      const targetUserRef = doc(db, "users", targetUid);
      await updateDoc(targetUserRef, {
        inviteRoomId: roomId
      });

      // 3. 自分をゲーム画面に移行させて待機させる
      activeRoomId = roomId;
      roomTitle.textContent = `部屋ID: ${roomId}`;
      showScreen("game");
      watchRoom(roomId);
    }

    // ─── 【新設】相手からの対戦申し込み（招待）をずっと見張る機能 ───
    function setupInviteListener() {
      if (unsubscribeInvite) unsubscribeInvite();
      unsubscribeInvite = onSnapshot(doc(db, "users", currentUid), async (snapshot) => {
        if (!snapshot.exists()) return;
        const myData = snapshot.data();
        
        // もし inviteRoomId に部屋IDが書き込まれていたら（＝誰かが対戦申込をしてくれたら）
        if (myData.inviteRoomId && myData.inviteRoomId !== "") {
          const roomId = myData.inviteRoomId;
          
          // 部屋情報を取得して、誰が誘ってきたか名前を特定する
          const roomSnap = await getDoc(doc(db, "rooms", roomId));
          if (!roomSnap.exists()) {
            // 既に部屋が消えていたらリセット
            await updateDoc(doc(db, "users", currentUid), { inviteRoomId: "" });
            return;
          }
          
          const roomData = roomSnap.data();
          const hostUid = roomData.players[0];
          const hostSnap = await getDoc(doc(db, "users", hostUid));
          const hostName = hostSnap.exists() ? hostSnap.data().username : "フレンド";

          // 通知ポップアップを表示
          const accept = confirm(`⚔️ 対戦のお誘い ⚔️\n\n${hostName} さんからしりとりの対戦申し込みが届きました！\n参戦しますか？`);
          
          const myUserRef = doc(db, "users", currentUid);
          if (accept) {
            // 「はい」の場合：申込部屋に入室する
            const roomRef = doc(db, "rooms", roomId);
            const updatedShingiCounts = { ...roomData.shingiCounts, [currentUid]: 0 };
            
            await updateDoc(roomRef, {
              players: arrayUnion(currentUid),
              shingiCounts: updatedShingiCounts,
              status: "playing"
            });
            
            // 自分の通知欄を綺麗にしてゲーム画面へ
            await updateDoc(myUserRef, { inviteRoomId: "" });
            activeRoomId = roomId;
            roomTitle.textContent = `部屋ID: ${roomId}`;
            showScreen("game");
            watchRoom(roomId);
          } else {
            // 「いいえ」の場合：通知欄を空にして申し込みを拒否する
            await updateDoc(myUserRef, { inviteRoomId: "" });
          }
        }
      });
    }

    // アプリを閉じるか別ページに行くときにオンライン状態を解除する（気休め程度ですが有効）
    window.addEventListener("beforeunload", () => {
      if (currentUid) {
        updateDoc(doc(db, "users", currentUid), { status: "offline" });
      }
    });

    document.getElementById("btn-to-friend").addEventListener("click", () => showScreen("friend"));
    document.getElementById("btn-friend-back").addEventListener("click", () => showScreen("menu"));

    // ─── 既存のゲーム制御ロジック ───
    function startLocalTimer(roomData) {
      clearInterval(countdownInterval);
      remainingTime = 15;
      timerBox.textContent = `残り時間: ${remainingTime}秒`;

      if (roomData.currentTurn === currentUid) {
        countdownInterval = setInterval(async () => {
          remainingTime--;
          timerBox.textContent = `残り時間: ${remainingTime}秒`;

          if (remainingTime <= 0) {
            clearInterval(countdownInterval);
            const roomRef = doc(db, "rooms", activeRoomId);
            try {
              const mySnap = await getDoc(doc(db, "users", currentUid));
              const myName = mySnap.exists() ? mySnap.data().username : "あなた";
              const enemyUid = roomData.players.find(uid => uid !== currentUid);
              const enemySnap = await getDoc(doc(db, "users", enemyUid));
              const enemyName = enemySnap.exists() ? enemySnap.data().username : "対戦相手";

              await updateDoc(roomRef, {
                status: "finished",
                winnerName: enemyName,
                finishReason: `${myName} さんの思考時間が15秒を超えた（時間切れ）ため`
              });
            } catch (e) { console.error(e); }
          }
        }, 1000);
      } else {
        timerBox.textContent = "相手の思考中...";
      }
    }

    function watchRoom(roomId) {
      if (unsubscribeRoom) unsubscribeRoom();
      unsubscribeRoom = onSnapshot(doc(db, "rooms", roomId), (snapshot) => {
        if (!snapshot.exists()) return;
        const data = snapshot.data();
        if (data.status === "waiting") {
          gameStatus.textContent = "相手の参加を待っています...（このIDを友達に伝えてね）";
          shiritoriArea.classList.add("hidden");
          clearInterval(countdownInterval);
        } else if (data.status === "playing") {
          gameStatus.textContent = "試合中！";
          shiritoriArea.classList.remove("hidden");
          currentWord.textContent = data.lastWord || "しりとり";
          const myUsedShingi = data.shingiCounts && data.shingiCounts[currentUid] ? data.shingiCounts[currentUid] : 0;
          const shingiRemaining = 10 - myUsedShingi;
          shingiCounter.textContent = `審議残り: ${shingiRemaining >= 0 ? shingiRemaining : 0}回`;

          if (data.currentTurn === currentUid) {
            turnIndicator.textContent = "あなたの番です！";
            turnIndicator.className = "turn-badge my-turn";
            shiritoriInput.disabled = false;
            btnSendWord.disabled = false;
            btnShingi.disabled = true;
          } else {
            turnIndicator.textContent = "相手の番です...";
            turnIndicator.className = "turn-badge enemy-turn";
            shiritoriInput.disabled = true;
            btnSendWord.disabled = true;
            btnShingi.disabled = false;
          }
          startLocalTimer(data);
        } else if (data.status === "finished") {
          clearInterval(countdownInterval);
          alert(`ゲーム終了！ 勝者: ${data.winnerName} 👑\n理由: ${data.finishReason}`);
          if (unsubscribeRoom) unsubscribeRoom();
          showScreen("menu");
        }
      });
    }

    btnSendWord.addEventListener("click", async () => {
      let input = shiritoriInput.value.trim();
      if (!input) return;
      if (!/^[ぁ-んー]+$/.test(input)) return alert("ひらがなだけで入力してください！");

      const roomRef = doc(db, "rooms", activeRoomId);
      try {
        const roomSnap = await getDoc(roomRef);
        const roomData = roomSnap.data();
        const lastWord = roomData.lastWord; 
        let lastChar = lastWord.slice(-1);
        if (lastChar === "ー" && lastWord.length > 1) lastChar = lastWord.slice(-2, -1);
        if (lastWord && lastChar !== input.charAt(0)) return alert(`「${lastChar}」から始まる単語を入力してください！`);

        clearInterval(countdownInterval);

        if (input.slice(-1) === "ん") {
          const mySnap = await getDoc(doc(db, "users", currentUid));
          const myName = mySnap.exists() ? mySnap.data().username : "相手";
          const enemyUid = roomData.players.find(uid => uid !== currentUid);
          const enemySnap = await getDoc(doc(db, "users", enemyUid));
          const enemyName = enemySnap.exists() ? enemySnap.data().username : "対戦相手";

          await updateDoc(roomRef, {
            status: "finished",
            winnerName: enemyName,
            finishReason: `${myName} さんが「ん」のつく単語を送信したため`
          });
          shiritoriInput.value = "";
          return;
        }
        const nextTurnUid = roomData.players.find(uid => uid !== currentUid);
        await updateDoc(roomRef, { lastWord: input, currentTurn: nextTurnUid, lastSenderUid: currentUid });
        shiritoriInput.value = ""; 
      } catch (error) { console.error(error); }
    });

    btnShingi.addEventListener("click", async () => {
      const roomRef = doc(db, "rooms", activeRoomId);
      try {
        const roomSnap = await getDoc(roomRef);
        const roomData = roomSnap.data();
        const currentShingiCount = roomData.shingiCounts && roomData.shingiCounts[currentUid] ? roomData.shingiCounts[currentUid] : 0;
        const mySnap = await getDoc(doc(db, "users", currentUid));
        const myName = mySnap.exists() ? mySnap.data().username : "あなた";
        const enemyUid = roomData.players.find(uid => uid !== currentUid);
        const enemySnap = await getDoc(doc(db, "users", enemyUid));
        const enemyName = enemySnap.exists() ? enemySnap.data().username : "対戦相手";

        if (currentShingiCount >= 10) {
          alert("ペナルティ負けになります！");
          clearInterval(countdownInterval);
          await updateDoc(roomRef, {
            status: "finished",
            winnerName: enemyName,
            finishReason: `${myName} さんが上限を超えて審議を繰り返したため`
          });
          return;
        }
        if (!confirm(`審議しますか？`)) return;
        clearInterval(countdownInterval);
        const updatedCounts = { ...roomData.shingiCounts, [currentUid]: currentShingiCount + 1 };
        await updateDoc(roomRef, {
          shingiCounts: updatedCounts,
          status: "finished",
          winnerName: myName,
          finishReason: `出された単語「${roomData.lastWord}」がリアル審議により無効となったため`
        });
      } catch (error) { console.error(error); }
    });

    btnRetire.addEventListener("click", async () => {
      if (!confirm("リタイアしますか？")) return;
      clearInterval(countdownInterval);
      const roomRef = doc(db, "rooms", activeRoomId);
      try {
        const roomSnap = await getDoc(roomRef);
        const roomData = roomSnap.data();
        const enemyUid = roomData.players.find(uid => uid !== currentUid);
        const enemySnap = await getDoc(doc(db, "users", enemyUid));
        const enemyName = enemySnap.exists() ? enemySnap.data().username : "対戦相手";
        await updateDoc(roomRef, {
          status: "finished",
          winnerName: enemyName,
          finishReason: `対戦相手がリタイア（降参）したため`
        });
      } catch (error) { console.error(error); }
    });

    document.getElementById("btn-leave").addEventListener("click", () => {
      clearInterval(countdownInterval);
      if (unsubscribeRoom) { unsubscribeRoom(); unsubscribeRoom = null; }
      showScreen("menu");
    });

    function showScreen(screenType) {
      loginScreen.classList.add("hidden");
      registerScreen.classList.add("hidden");
      menuScreen.classList.add("hidden");
      gameScreen.classList.add("hidden");
      friendScreen.classList.add("hidden");

      if (screenType === "login") loginScreen.classList.remove("hidden");
      if (screenType === "register") registerScreen.classList.remove("hidden");
      if (screenType === "menu") menuScreen.classList.remove("hidden");
      if (screenType === "game") gameScreen.classList.remove("hidden");
      if (screenType === "friend") friendScreen.classList.remove("hidden");
    }
  </script>
</body>
</html>
